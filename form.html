<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Validasi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .form-container {
      max-width: 500px;
      margin: 50px auto;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Website Produk</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="produk.html">Produk</a></li>
          <li class="nav-item"><a class="nav-link" href="tabel.html">Tabel</a></li>
          <li class="nav-item"><a class="nav-link" href="slider.html">Slider</a></li>
          <li class="nav-item"><a class="nav-link active" href="form.html">Form</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Form Validasi -->
  <div class="container form-container">
    <h2 class="mb-4">Form Validasi</h2>
    <form id="formValidasi">
      <div class="mb-3">
        <label for="nama" class="form-label">Nama Lengkap</label>
        <input type="text" class="form-control" id="nama" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" minlength="6" required>
      </div>
      <div class="mb-3">
        <label for="konfirmasi" class="form-label">Konfirmasi Password</label>
        <input type="password" class="form-control" id="konfirmasi" required>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <div id="pesan" class="mt-3"></div>
  </div>

  <script>
    document.getElementById('formValidasi').addEventListener('submit', function(event) {
      event.preventDefault();
      const password = document.getElementById('password').value;
      const konfirmasi = document.getElementById('konfirmasi').value;
      const pesan = document.getElementById('pesan');

      if (password !== konfirmasi) {
        pesan.innerHTML = '<div class="alert alert-danger">Password tidak cocok.</div>';
      } else {
        pesan.innerHTML = '<div class="alert alert-success">Form berhasil dikirim!</div>';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
